<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Бесконечный Мир</title>
<style>
body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
canvas { display: block; touch-action: none; }
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
    Управление: как было<br>
    Мир: океаны + редкие материки
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let WIDTH = innerWidth;
let HEIGHT = innerHeight;
canvas.width = WIDTH;
canvas.height = HEIGHT;

// камера
let camX = 245;
let camY = 132;
let zoom = 0.75;
let targetZoom = 0.75;

// скорость
let velX = 0;
let velY = 0;

// noise
let permutation = new Uint8Array(512);

function initNoise(){
    for(let i=0;i<256;i++) permutation[i]=i;
    for(let i=255;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [permutation[i],permutation[j]]=[permutation[j],permutation[i]];
    }
    for(let i=0;i<256;i++) permutation[256+i]=permutation[i];
}

function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+t*(b-a);}

function grad(h,x,y){
    const u=h<8?x:y;
    const v=h<4?y:h===12||h===14?x:0;
    return ((h&1)?-u:u)+((h&2)?-v:v);
}

function perlin(x,y){
    const X=Math.floor(x)&255;
    const Y=Math.floor(y)&255;
    x-=Math.floor(x);
    y-=Math.floor(y);

    const u=fade(x);
    const v=fade(y);

    const A=permutation[X]+Y;
    const AA=permutation[A];
    const AB=permutation[A+1];
    const B=permutation[X+1]+Y;
    const BA=permutation[B];
    const BB=permutation[B+1];

    return lerp(
        lerp(grad(permutation[AA],x,y),grad(permutation[BA],x-1,y),u),
        lerp(grad(permutation[AB],x,y-1),grad(permutation[BB],x-1,y-1),u),
        v
    )*0.5+0.5;
}

function fbm(x,y){
    let sum=0,amp=1,freq=1,max=0;
    for(let i=0;i<6;i++){
        sum+=perlin(x*freq,y*freq)*amp;
        max+=amp;
        amp*=0.5;
        freq*=2;
    }
    return sum/max;
}

// 🌊 НОРМАЛЬНАЯ ГЕОГРАФИЯ
function getHeight(x,y){
    // КРУПНЫЕ материки
    const continental = fbm(x*0.0009, y*0.0009);

    // детали убираем частично
    const detail = fbm(x*0.006, y*0.006);

    let h = continental * 1.25 + detail * 0.15;

    // сглаживание (убирает "игольчатые горы")
    h = h*h*(3-2*h);

    return Math.max(0, Math.min(1,h));
}

function getMoisture(x,y){
    return fbm(x*0.003, y*0.003);
}

// 🎨 ЦВЕТА МИРА
function getColor(x,y){
    const h=getHeight(x,y);
    const m=getMoisture(x,y);

    // 🌊 океан (главное состояние мира)
    if(h<0.48){
        if(h<0.30) return '#06172c'; // глубокий
        if(h<0.40) return '#0c2f4d'; // средний
        return '#1a5a7a';            // мелкий
    }

    // 🏖 берег
    if(h<0.52) return '#d6c08a';

    // 🟩 суша
    if(h<0.78){
        if(m<0.30) return '#c2a15a'; // пустыня
        return '#2f7d3a';             // зелень
    }

    // ⛰ горы (редко)
    return '#7a7a7a';
}

// рендер
function render(){
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,WIDTH,HEIGHT);

    const tile=7;
    const worldTile=tile/zoom;

    const left=camX-WIDTH/(2*zoom);
    const right=camX+WIDTH/(2*zoom);
    const top=camY-HEIGHT/(2*zoom);
    const bottom=camY+HEIGHT/(2*zoom);

    const startX=Math.floor(left/worldTile)*worldTile;
    const startY=Math.floor(top/worldTile)*worldTile;

    for(let y=startY;y<bottom;y+=worldTile){
        for(let x=startX;x<right;x+=worldTile){

            const cx=x+worldTile*0.5;
            const cy=y+worldTile*0.5;

            const col=getColor(cx,cy);

            const sx=(x-camX)*zoom+WIDTH/2;
            const sy=(y-camY)*zoom+HEIGHT/2;

            ctx.fillStyle=col;
            ctx.fillRect(sx,sy,worldTile*zoom+1,worldTile*zoom+1);
        }
    }
}

// loop
function loop(){
    camX+=velX;
    camY+=velY;

    velX*=0.88;
    velY*=0.88;

    zoom=zoom*0.88+targetZoom*0.12;

    render();
    requestAnimationFrame(loop);
}

// controls (НЕ ТРОГАЛ)
window.addEventListener('wheel',e=>{
    e.preventDefault();
    targetZoom=Math.max(0.05,Math.min(25,targetZoom*(e.deltaY>0?0.85:1.18)));
},{passive:false});

window.addEventListener('keydown',e=>{
    const s=18/zoom;
    if(e.key==='w') velY=-s;
    if(e.key==='s') velY=s;
    if(e.key==='a') velX=-s;
    if(e.key==='d') velX=s;

    if(e.key==='r'){
        camX=245;
        camY=132;
        targetZoom=0.75;
    }
});

window.addEventListener('resize',()=>{
    WIDTH=innerWidth;
    HEIGHT=innerHeight;
    canvas.width=WIDTH;
    canvas.height=HEIGHT;
});

// start
initNoise();
loop();
</script>

</body>
</html>
