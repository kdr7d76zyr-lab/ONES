<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Generator</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: #000;
    }

    canvas {
        display: block;
        image-rendering: pixelated;
    }

    #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;

        color: white;
        font-family: Arial;
        background: rgba(0,0,0,0.45);

        padding: 10px 14px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
    }

    button {
        margin-top: 8px;
        cursor: pointer;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        background: #1e90ff;
        color: white;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="ui">
    <div>Колесо — zoom</div>
    <div>ЛКМ — двигать</div>
    <button id="regen">Новый мир</button>
</div>

<canvas id="canvas"></canvas>

<script>

// ======================================================
// CANVAS
// ======================================================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", {
    alpha: false
});

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ======================================================
// WORLD SETTINGS
// ======================================================

const WORLD_W = 8192;
const WORLD_H = 4096;

// Размер "пикселя" мира
const PIXEL = 2;

// ======================================================
// CAMERA
// ======================================================

let camX = WORLD_W / 2;
let camY = WORLD_H / 2;

let zoom = 0.22;

let dragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
});

window.addEventListener("mouseup", () => {
    dragging = false;
});

window.addEventListener("mousemove", e => {

    if (!dragging) return;

    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;

    camX -= dx / zoom;
    camY -= dy / zoom;

    lastX = e.clientX;
    lastY = e.clientY;
});

canvas.addEventListener("wheel", e => {

    e.preventDefault();

    const factor = 1.12;

    if (e.deltaY < 0) zoom *= factor;
    else zoom /= factor;

    zoom = Math.max(0.05, Math.min(zoom, 60));

}, { passive: false });

// ======================================================
// RANDOM
// ======================================================

let SEED = Math.random() * 9999999;

function rand(x, y) {

    let n =
        x * 374761393 +
        y * 668265263 +
        SEED * 1447;

    n = (n ^ (n >> 13)) * 1274126177;

    return ((n ^ (n >> 16)) >>> 0) / 4294967295;
}

// ======================================================
// FAST TILEABLE VALUE NOISE
// ======================================================

function smooth(t) {
    return t * t * (3 - 2 * t);
}

function noise(x, y, scale) {

    x /= scale;
    y /= scale;

    const fx = Math.floor(x);
    const fy = Math.floor(y);

    const tx = x - fx;
    const ty = y - fy;

    const x0 = ((fx % WORLD_W) + WORLD_W) % WORLD_W;
    const y0 = ((fy % WORLD_H) + WORLD_H) % WORLD_H;

    const x1 = (x0 + 1) % WORLD_W;
    const y1 = (y0 + 1) % WORLD_H;

    const v00 = rand(x0, y0);
    const v10 = rand(x1, y0);
    const v01 = rand(x0, y1);
    const v11 = rand(x1, y1);

    const sx = smooth(tx);
    const sy = smooth(ty);

    const ix0 = v00 + (v10 - v00) * sx;
    const ix1 = v01 + (v11 - v01) * sx;

    return ix0 + (ix1 - ix0) * sy;
}

function fbm(x, y) {

    let value = 0;
    let amp = 1;

    value += noise(x, y, 2200) * amp;
    amp *= 0.5;

    value += noise(x, y, 1100) * amp;
    amp *= 0.5;

    value += noise(x, y, 550) * amp;
    amp *= 0.5;

    value += noise(x, y, 280) * amp;
    amp *= 0.5;

    value += noise(x, y, 140) * amp;

    return value / 1.9375;
}

// ======================================================
// WORLD HEIGHT
// ======================================================

function getHeight(x, y) {

    // Главный континентальный шум
    let continental = noise(x, y, 3000);

    // Детали
    let detail = fbm(x, y);

    // Огромные массы
    let mega = noise(x, y, 5000);

    // Смешивание
    let h =
        continental * 0.58 +
        detail * 0.27 +
        mega * 0.15;

    // Континенты
    h = Math.pow(h, 1.35);

    // Полюса
    const latitude =
        Math.abs((y / WORLD_H) * 2 - 1);

    // Реалистичные ледяные шапки
    const polar =
        Math.max(0, latitude - 0.72) * 3.5;

    return {
        h,
        polar
    };
}

// ======================================================
// COLORING
// ======================================================

function color(data) {

    const h = data.h;
    const polar = data.polar;

    // ЛЕДЯНЫЕ ПОЛЮСА
    if (polar > 0.65 && h > 0.35) {
        return "#f3fbff";
    }

    // ГЛУБОКИЙ ОКЕАН
    if (h < 0.28) {
        return "#00152e";
    }

    // ОКЕАН
    if (h < 0.36) {
        return "#002b5e";
    }

    // МОРЕ
    if (h < 0.42) {
        return "#00458f";
    }

    // ШЕЛЬФ
    if (h < 0.46) {
        return "#1d6bc1";
    }

    // ПЛЯЖ
    if (h < 0.485) {
        return "#d9cf97";
    }

    // НИЗМЕННОСТИ
    if (h < 0.60) {
        return "#4f9b58";
    }

    // ЛЕСА
    if (h < 0.68) {
        return "#3d7a42";
    }

    // ВЫСОКОГОРЬЕ
    if (h < 0.77) {
        return "#6e655a";
    }

    // ГОРЫ
    if (h < 0.86) {
        return "#8b847b";
    }

    // СНЕГ
    return "#f0f0f0";
}

// ======================================================
// IMAGE BUFFER
// ======================================================

let imageData;
let pixels;

// ======================================================
// RENDER
// ======================================================

function render() {

    imageData = ctx.createImageData(
        canvas.width,
        canvas.height
    );

    pixels = imageData.data;

    // Адаптивная детализация
    let step = 1;

    if (zoom < 0.08) step = 8;
    else if (zoom < 0.14) step = 6;
    else if (zoom < 0.22) step = 4;
    else if (zoom < 0.4) step = 3;
    else if (zoom < 1) step = 2;

    const worldViewW = canvas.width / zoom;
    const worldViewH = canvas.height / zoom;

    const startX = camX - worldViewW / 2;
    const startY = camY - worldViewH / 2;

    for (let sy = 0; sy < canvas.height; sy += step) {

        const wy =
            ((Math.floor(startY + sy / zoom) % WORLD_H)
            + WORLD_H) % WORLD_H;

        for (let sx = 0; sx < canvas.width; sx += step) {

            const wx =
                ((Math.floor(startX + sx / zoom) % WORLD_W)
                + WORLD_W) % WORLD_W;

            const data = getHeight(wx, wy);

            const hex = color(data);

            const r = parseInt(hex.substr(1,2),16);
            const g = parseInt(hex.substr(3,2),16);
            const b = parseInt(hex.substr(5,2),16);

            // Заполнение блока
            for (let yy = 0; yy < step; yy++) {

                for (let xx = 0; xx < step; xx++) {

                    const px = sx + xx;
                    const py = sy + yy;

                    if (
                        px >= canvas.width ||
                        py >= canvas.height
                    ) continue;

                    const i =
                        (py * canvas.width + px) * 4;

                    pixels[i] = r;
                    pixels[i+1] = g;
                    pixels[i+2] = b;
                    pixels[i+3] = 255;
                }
            }
        }
    }

    ctx.putImageData(imageData, 0, 0);

    requestAnimationFrame(render);
}

// ======================================================
// REGENERATE
// ======================================================

document.getElementById("regen")
.onclick = () => {

    SEED = Math.random() * 99999999;
};

// ======================================================
// START
// ======================================================

render();

</script>
</body>
</html>
