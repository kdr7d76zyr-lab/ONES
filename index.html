<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perlin & Voronoi Noise</title>

<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    canvas {
        border: 2px solid white;
        margin-top: 10px;
    }

    .controls {
        margin-top: 10px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }

    label {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    input, select {
        margin-top: 5px;
    }
</style>
</head>
<body>

<h2>Шум Перлина и Вороного</h2>

<div class="controls">

    <label>
        Тип шума
        <select id="noiseType">
            <option value="perlin">Perlin</option>
            <option value="voronoi">Voronoi</option>
        </select>
    </label>

    <label>
        Scale
        <input type="range" id="scale" min="10" max="200" value="50">
    </label>

    <label>
        Cells (Voronoi)
        <input type="range" id="cells" min="5" max="100" value="30">
    </label>

</div>

<canvas id="canvas" width="500" height="500"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scaleInput = document.getElementById("scale");
const cellsInput = document.getElementById("cells");
const noiseType = document.getElementById("noiseType");

function randomGradient() {
    const angle = Math.random() * Math.PI * 2;
    return {
        x: Math.cos(angle),
        y: Math.sin(angle)
    };
}

const gradients = {};

function dotGridGradient(ix, iy, x, y) {

    const key = ix + "," + iy;

    if (!gradients[key]) {
        gradients[key] = randomGradient();
    }

    const gradient = gradients[key];

    const dx = x - ix;
    const dy = y - iy;

    return dx * gradient.x + dy * gradient.y;
}

function lerp(a, b, t) {
    return a + t * (b - a);
}

function fade(t) {
    return t * t * t * (t * (t * 6 - 15) + 10);
}

function perlin(x, y) {

    const x0 = Math.floor(x);
    const x1 = x0 + 1;

    const y0 = Math.floor(y);
    const y1 = y0 + 1;

    const sx = fade(x - x0);
    const sy = fade(y - y0);

    const n0 = dotGridGradient(x0, y0, x, y);
    const n1 = dotGridGradient(x1, y0, x, y);

    const ix0 = lerp(n0, n1, sx);

    const n2 = dotGridGradient(x0, y1, x, y);
    const n3 = dotGridGradient(x1, y1, x, y);

    const ix1 = lerp(n2, n3, sx);

    return lerp(ix0, ix1, sy);
}

function drawPerlin() {

    const image = ctx.createImageData(canvas.width, canvas.height);
    const scale = Number(scaleInput.value);

    for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {

            const value = perlin(x / scale, y / scale);

            const color = Math.floor((value + 1) * 128);

            const index = (y * canvas.width + x) * 4;

            image.data[index] = color;
            image.data[index + 1] = color;
            image.data[index + 2] = color;
            image.data[index + 3] = 255;
        }
    }

    ctx.putImageData(image, 0, 0);
}

function generatePoints(count) {

    const points = [];

    for (let i = 0; i < count; i++) {
        points.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height
        });
    }

    return points;
}

function drawVoronoi() {

    const image = ctx.createImageData(canvas.width, canvas.height);

    const points = generatePoints(Number(cellsInput.value));

    for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {

            let minDist = Infinity;

            for (const p of points) {

                const dx = x - p.x;
                const dy = y - p.y;

                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < minDist) {
                    minDist = dist;
                }
            }

            const color = Math.max(0, 255 - minDist);

            const index = (y * canvas.width + x) * 4;

            image.data[index] = color;
            image.data[index + 1] = color;
            image.data[index + 2] = color;
            image.data[index + 3] = 255;
        }
    }

    ctx.putImageData(image, 0, 0);
}

function render() {

    if (noiseType.value === "perlin") {
        drawPerlin();
    } else {
        drawVoronoi();
    }
}

scaleInput.addEventListener("input", render);
cellsInput.addEventListener("input", render);
noiseType.addEventListener("change", render);

render();

</script>

</body>
</html>
